<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      font-size: 12px;
      margin: 8px;
      color: #333;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
    }
    .dot.connected { background: #2ecc71; }
    .dot.connecting { background: #f1c40f; }
    .dot.disconnected { background: #e74c3c; }
    #log {
      font-size: 10px;
      color: #888;
      max-height: 120px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Disconnected</span>
  </div>
  <div id="log"></div>

  <script>
    const BRIDGE_URL = "ws://127.0.0.1:9001";
    const RECONNECT_BASE_MS = 1000;
    const RECONNECT_MAX_MS = 30000;
    const RECONNECT_MULTIPLIER = 2;

    let ws = null;
    let reconnectDelay = RECONNECT_BASE_MS;
    let reconnectTimer = null;

    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const logEl = document.getElementById("log");

    function log(msg) {
      const line = document.createElement("div");
      line.textContent = new Date().toLocaleTimeString() + " " + msg;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
      // Keep only last 50 lines
      while (logEl.children.length > 50) {
        logEl.removeChild(logEl.firstChild);
      }
    }

    function setStatus(status) {
      statusDot.className = "dot " + status;
      statusText.textContent = status.charAt(0).toUpperCase() + status.slice(1);
    }

    function connect() {
      setStatus("connecting");
      log("Connecting to bridge...");

      try {
        ws = new WebSocket(BRIDGE_URL);
      } catch (e) {
        log("Failed to create WebSocket: " + e.message);
        setStatus("disconnected");
        scheduleReconnect();
        return;
      }

      ws.onopen = function() {
        log("Connected to bridge");
        setStatus("connected");
        reconnectDelay = RECONNECT_BASE_MS;

        // Send REGISTER
        var registerMsg = {
          type: "REGISTER",
          requestId: "req_0_register",
          pluginId: "figma-mcp-plugin",
          pluginVersion: "1.0.0"
        };
        ws.send(JSON.stringify(registerMsg));
        log("Sent REGISTER");
      };

      // Defense-in-depth: validate messages before forwarding to sandbox
      var ALLOWED_COMMANDS = [
        "get_document_info", "get_selection", "get_node",
        "create_frame", "set_auto_layout",
        "create_rectangle", "create_ellipse",
        "create_text", "update_text",
        "update_node", "add_shadow", "group_nodes", "delete_node",
        "create_component", "zoom_to_node"
      ];
      var REQ_ID_RE = /^req_\d+_[a-z0-9]+$/;

      ws.onmessage = function(event) {
        try {
          var msg = JSON.parse(event.data);
          if (msg.type === "COMMAND") {
            // Validate requestId format
            if (!REQ_ID_RE.test(msg.requestId)) {
              log("Rejected: invalid requestId");
              return;
            }
            // Validate command is in allowlist
            if (ALLOWED_COMMANDS.indexOf(msg.command) === -1) {
              log("Rejected: unknown command " + msg.command);
              return;
            }
            log("CMD: " + msg.command + " [" + msg.requestId + "]");
            // Forward to plugin sandbox (Figma mediates via pluginMessage wrapper)
            parent.postMessage({ pluginMessage: msg }, "*");
          }
        } catch (e) {
          log("Parse error: " + e.message);
        }
      };

      ws.onclose = function(event) {
        log("Disconnected: " + event.code + " " + (event.reason || ""));
        setStatus("disconnected");
        ws = null;
        scheduleReconnect();
      };

      ws.onerror = function(error) {
        log("WebSocket error");
        // onclose will follow
      };
    }

    function scheduleReconnect() {
      if (reconnectTimer !== null) return;

      var jitter = Math.random() * 500;
      var delay = Math.min(reconnectDelay + jitter, RECONNECT_MAX_MS);

      log("Reconnecting in " + Math.round(delay) + "ms");
      reconnectTimer = setTimeout(function() {
        reconnectTimer = null;
        reconnectDelay = Math.min(reconnectDelay * RECONNECT_MULTIPLIER, RECONNECT_MAX_MS);
        connect();
      }, delay);
    }

    // Receive RESPONSE from plugin sandbox, forward to bridge
    window.onmessage = function(event) {
      var msg = event.data && event.data.pluginMessage;
      if (msg && msg.type === "RESPONSE" && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(msg));
        log("RSP: " + (msg.success ? "OK" : "ERR") + " [" + msg.requestId + "]");
      }
    };

    // Start connection
    connect();
  </script>
</body>
</html>
