<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      font-size: 12px;
      margin: 8px;
      color: #333;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
    }

    .dot.connected {
      background: #2ecc71;
    }

    .dot.connecting {
      background: #f1c40f;
    }

    .dot.disconnected {
      background: #e74c3c;
    }

    #log {
      font-size: 10px;
      color: #888;
      max-height: 100px;
      overflow-y: auto;
    }

    #settings {
      margin-top: 8px;
      font-size: 10px;
      color: #666;
    }

    #settings summary {
      cursor: pointer;
      user-select: none;
      color: #999;
    }

    #settings summary:hover {
      color: #555;
    }

    .settings-body {
      margin-top: 6px;
    }

    .settings-body label {
      display: block;
      margin-bottom: 3px;
      color: #888;
    }

    #urlInput {
      width: 100%;
      box-sizing: border-box;
      font-size: 10px;
      padding: 3px 5px;
      border: 1px solid #ddd;
      border-radius: 3px;
      font-family: monospace;
    }

    #saveBtn {
      margin-top: 5px;
      font-size: 10px;
      padding: 3px 10px;
      border: 1px solid #bbb;
      border-radius: 3px;
      background: #f5f5f5;
      cursor: pointer;
    }

    #saveBtn:hover {
      background: #e8e8e8;
    }
  </style>
</head>

<body>
  <div class="status">
    <div class="dot disconnected" id="statusDot"></div>
    <span id="statusText">Initializing...</span>
  </div>
  <div id="log">
    <div style="font-size: 10px; color: #999;">Waiting for bridge URL...</div>
  </div>

  <details id="settings">
    <summary>&#9881; Settings</summary>
    <div class="settings-body">
      <label>Bridge URL:</label>
      <input id="urlInput" type="text" placeholder="ws://localhost:9001" />
      <button id="saveBtn">Save &amp; Reconnect</button>
    </div>
  </details>

  <script>
    // ALLOWED_COMMANDS source of truth: src/shared/constants.ts → COMMAND_NAMES
    var statusDot = document.getElementById("statusDot");
    var statusText = document.getElementById("statusText");
    var logEl = document.getElementById("log");
    var urlInput = document.getElementById("urlInput");

    function log(msg, level) {
      level = level || "info";
      var line = document.createElement("div");
      var prefix = new Date().toLocaleTimeString() + " [" + level + "] ";
      line.textContent = prefix + msg;
      if (level === "error") line.style.color = "#e74c3c";
      else if (level === "warn") line.style.color = "#f1c40f";
      else if (level === "debug") line.style.color = "#95a5a6";
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
      while (logEl.children.length > 50) {
        logEl.removeChild(logEl.firstChild);
      }
    }

    function setStatus(status) {
      statusDot.className = "dot " + status;
      statusText.textContent = status.charAt(0).toUpperCase() + status.slice(1);
    }

    setStatus("disconnected");

    // Bridge URL — set dynamically via INIT message from code.ts (figma.clientStorage)
    var BRIDGE_URL = null;
    var RECONNECT_BASE_MS = 1000;
    var RECONNECT_MAX_MS = 30000;
    var RECONNECT_MULTIPLIER = 2;

    var ws = null;
    var reconnectDelay = RECONNECT_BASE_MS;
    var reconnectTimer = null;

    function connect() {
      // Wait until code.ts sends the INIT message with the bridge URL
      if (!BRIDGE_URL) return;

      setStatus("connecting");
      log("Connecting to " + BRIDGE_URL + "...", "info");

      try {
        ws = new WebSocket(BRIDGE_URL);
      } catch (e) {
        log("Failed to create WebSocket: " + e.message, "error");
        setStatus("disconnected");
        scheduleReconnect();
        return;
      }

      ws.onopen = function () {
        log("Connected to bridge", "info");
        setStatus("connected");
        reconnectDelay = RECONNECT_BASE_MS;

        // Send REGISTER with a unique requestId each connection
        var registerMsg = {
          type: "REGISTER",
          requestId: "req_" + Date.now() + "_" + Math.random().toString(36).substring(2, 8),
          pluginId: "figma-mcp-plugin",
          pluginVersion: "1.0.0"
        };
        ws.send(JSON.stringify(registerMsg));
        log("Sent REGISTER", "debug");
      };

      // ALLOWED_COMMANDS source of truth: src/shared/constants.ts → COMMAND_NAMES
      var ALLOWED_COMMANDS = [
        // Read
        "get_document_info", "get_selection", "get_node",
        // Create
        "create_frame", "create_rectangle", "create_ellipse", "create_text",
        "create_line", "create_polygon",
        // Modify
        "set_auto_layout", "update_text", "update_node", "add_shadow",
        // Style
        "set_fill", "set_stroke", "set_corner_radius", "set_effects",
        // Layout
        "set_node_layout_properties",
        // Organize
        "group_nodes", "delete_node", "create_component",
        "clone_node", "reorder_node",
        // Component
        "create_component_instance", "get_local_components", "list_available_fonts",
        // Viewport
        "zoom_to_node",
        // Phase 2: Style system
        "create_paint_style", "create_text_style", "get_local_styles", "apply_style",
        // Phase 2: Image
        "set_image_fill",
        // Phase 2: Export
        "export_node",
        // Phase 2: Typography
        "set_text_decoration", "set_text_case", "set_text_list",
        // Phase 2: Constraints & grids
        "set_constraints", "set_layout_grids",
        // Phase 3: Batch
        "batch_create", "batch_update",
        // Phase 3: Vector
        "create_vector", "create_boolean_operation",
        // Phase 3: Pages
        "create_page", "create_section",
        // Phase 3: Traversal
        "find_nodes",
        // Phase 3: Variables
        "create_variable_collection", "create_variable", "bind_variable",
        // Phase 4: Workflow
        "flatten_node", "ungroup_nodes", "set_selection", "set_current_page",
        "create_effect_style", "get_variables",
        // Phase 5: Design system
        "combine_as_variants", "detach_instance", "swap_component", "import_component_by_key",
        // Phase 6: Manipulation
        "set_rotation", "set_blend_mode", "lock_node",
        // Phase 6: Extra shapes
        "create_star", "create_svg_node", "notify"
      ];
      var REQ_ID_RE = /^req_\d+_[a-z0-9]+$/;

      ws.onmessage = function (event) {
        try {
          var msg = JSON.parse(event.data);
          if (msg.type === "COMMAND") {
            if (!REQ_ID_RE.test(msg.requestId)) {
              log("Rejected: invalid requestId", "warn");
              return;
            }
            if (ALLOWED_COMMANDS.indexOf(msg.command) === -1) {
              log("Rejected: unknown command " + msg.command, "warn");
              return;
            }
            log("CMD: " + msg.command + " [" + msg.requestId + "]", "info");
            parent.postMessage({ pluginMessage: msg }, "*");
          }
        } catch (e) {
          log("Parse error: " + e.message, "error");
        }
      };

      ws.onclose = function (event) {
        log("Disconnected: " + event.code + " " + (event.reason || ""), "warn");
        setStatus("disconnected");
        ws = null;
        scheduleReconnect();
      };

      ws.onerror = function () {
        log("WebSocket error", "error");
      };
    }

    function scheduleReconnect() {
      if (reconnectTimer !== null) return;

      var jitter = Math.random() * 500;
      var delay = Math.min(reconnectDelay + jitter, RECONNECT_MAX_MS);

      log("Reconnecting in " + Math.round(delay) + "ms", "debug");
      reconnectTimer = setTimeout(function () {
        reconnectTimer = null;
        reconnectDelay = Math.min(reconnectDelay * RECONNECT_MULTIPLIER, RECONNECT_MAX_MS);
        connect();
      }, delay);
    }

    // Messages from code.ts plugin sandbox
    window.onmessage = function (event) {
      var msg = event.data && event.data.pluginMessage;
      if (!msg) return;

      // INIT: code.ts sends the bridge URL (from clientStorage or default)
      if (msg.type === "INIT") {
        var newUrl = msg.bridgeUrl;
        urlInput.value = newUrl;

        if (BRIDGE_URL !== newUrl) {
          // URL changed — close existing connection and reconnect
          BRIDGE_URL = newUrl;
          if (ws) { ws.close(); ws = null; }
          if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
          reconnectDelay = RECONNECT_BASE_MS;
          connect();
        } else if (!ws || ws.readyState === WebSocket.CLOSED || ws.readyState === WebSocket.CLOSING) {
          connect();
        }
        return;
      }

      // RESPONSE from plugin sandbox — forward to bridge
      if (msg.type === "RESPONSE" && ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(msg));
        log("RSP: " + (msg.success ? "OK" : "ERR") + " [" + msg.requestId + "]", msg.success ? "info" : "warn");
      }
    };

    // Save settings button — sends new URL to code.ts which persists it
    document.getElementById("saveBtn").addEventListener("click", function () {
      var newUrl = urlInput.value.trim();
      if (!newUrl) return;
      log("Saving URL: " + newUrl, "info");
      parent.postMessage({ pluginMessage: { type: "SAVE_SETTINGS", bridgeUrl: newUrl } }, "*");
    });
  </script>
</body>

</html>
